name: CopyParty
options:
  bundleIdPrefix: com.brielle
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.5.0"
    CURRENT_PROJECT_VERSION: "6"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES

targets:
  CopyParty:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brielle.CopyParty
        PRODUCT_NAME: CopyParty
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CopyParty.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: CopyParty
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Brielle Harrison. All rights reserved."
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        # Network servers + child processes need a regular (not agent) app.
        INFOPLIST_KEY_LSUIElement: NO
    postCompileScripts:
      - name: "Embed Python runtime + copyparty-sfx"
        script: bash "$SRCROOT/scripts/embed-vendor.sh"
        basedOnDependencyAnalysis: false
